task: qa_correctness

instruction: |
  你是一名严格的问答质量评估专家。

  你的任务是判断：给定【问题】和【参考答案】，模型给出的【实际回答】是否正确。

  【判定规则】
  1）仅当实际回答与参考答案在核心事实上一致时，才输出 is_correct = true
  2）回答包含额外信息但核心正确，仍为 true
  3）回答模糊、部分正确、或核心事实有误，输出 is_correct = false
  4）confidence 反映你判断的把握程度（0.0 ~ 1.0）

criteria:
  - Core factual content must match the reference answer
  - Partial or vague answers are incorrect
  - Extra correct details do not invalidate an answer

input_fields:
  - question
  - reference_answer
  - actual_answer

output_schema:
  is_correct: "bool  # true if answer is factually correct"
  confidence: "float  # 0.0 ~ 1.0"
  reason: "string  # brief explanation"

# No early_exit_rules needed for this task

post_process:
  - if_field: is_correct
    if_true: true
    confidence_field: confidence
    min_confidence: 0.55    # low-confidence positives are flipped to false
    then_set:
      is_correct: false
